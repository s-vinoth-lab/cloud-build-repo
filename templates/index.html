<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask Notes App</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .note-card { margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">My Notes</h1>
        
        <div class="row justify-content-center">
            <div class="col-md-6">
                <!-- Add Note Form -->
                <form action="/add" method="POST" class="mb-4">
                    <div class="input-group">
                        <input type="text" name="content" class="form-control" placeholder="Write a note..." required>
                        <button type="submit" class="btn btn-primary">Add Note</button>
                    </div>
                </form>

                <!-- Notes List -->
                <div id="notes-list">
                    {% for note in notes %}
                    <div class="card note-card shadow-sm">
                        <div class="card-body d-flex justify-content-between align-items-center">
                            <p class="card-text mb-0">{{ note.content }}</p>
                            <form action="/delete/{{ note.id }}" method="POST">
                                <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                            </form>
                        </div>
                    </div>
                    {% else %}
                    <p class="text-center text-muted">No notes yet. Add one above!</p>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
